name: CI

# Gate every push / PR on: the scoring engine still ranks the golden cases
# correctly, the disorder/analyte data is structurally sound, and the app
# still builds. A red check here means the change must not reach the
# deployed (Vercel) site.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Data-integrity linter
        run: npm run lint:data

      - name: Golden-case + data tests
        run: npm test

      - name: Production build
        run: npm run build
